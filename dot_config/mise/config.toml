[tasks.sync-dotfiles]
description = "Sync dotfiles using chezmoi"
run = '''
# 差分があるかチェック (フラグを使わず標準出力の有無で判定)
DIFF_OUT=$(chezmoi diff)
if [ -z "$DIFF_OUT" ]; then
    echo "No changes in HOME. Skip re-add/commit/push."
    exit 0
fi

echo "Checking changes..."
chezmoi status

# ファイルのみを再追加
# -f で実在確認し、ディレクトリを除外
chezmoi managed --include files | while read -r file; do
    if [ -f "$HOME/$file" ]; then
        chezmoi re-add "$HOME/$file"
    fi
done

# sourceディレクトリへ移動
SOURCE_DIR=$(chezmoi source-path)
cd "$SOURCE_DIR"

# Gitの差分チェック
if git diff --quiet; then
    echo "No changes to source state. Skip commit/push."
    exit 0
fi

# コミットとプッシュ
git diff --stat
git add .
git commit -m "Sync (from Mac)"
git push
'''

[tasks.niri]
run = "~/.config/yabai/niri-mode.sh {{args}}"
