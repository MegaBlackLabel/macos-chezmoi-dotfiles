# ================================
# AeroSpace 設定ファイル（日本語版）
# ================================
# このファイルを ~/.aerospace.toml に配置してください
# 以降は自由に編集できます

# --------------------------------
# 設定バージョン（将来の非推奨対策）
# --------------------------------
config-version = 2

# --------------------------------
# AeroSpace 起動後に実行するコマンド
# --------------------------------
after-startup-command = []

# --------------------------------
# macOS ログイン時に AeroSpace を自動起動
# --------------------------------
start-at-login = true

# --------------------------------
# レイアウトの正規化設定
# --------------------------------
# コンテナの入れ子をフラット化
enable-normalization-flatten-containers = true
# ネストしたコンテナの向きを反転して整える
enable-normalization-opposite-orientation-for-nested-containers = true

# --------------------------------
# レイアウト設定
# --------------------------------
# アコーディオンレイアウトのパディング（0 で無効）
accordion-padding = 30

# ルートコンテナのレイアウト（tiles / accordion）
default-root-container-layout = 'accordion'

# ルートコンテナの向き（horizontal / vertical / auto）
# auto = 横長モニタは horizontal、縦長モニタは vertical
default-root-container-orientation = 'auto'

# --------------------------------
# モニタ切り替え時にマウスをフォーカスへ移動
# --------------------------------
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# --------------------------------
# macOS の「アプリを隠す（cmd-h）」を無効化するか
# --------------------------------
automatically-unhide-macos-hidden-apps = false

# --------------------------------
# 空でも維持するワークスペース
# --------------------------------
persistent-workspaces = [
  "1","2","3","4","5","6","7","8","9",
  "A","B","C","D","E","F","G","I","M","N","O","P","Q","R","S","T","U","V","W","X","Y","Z"
]

# --------------------------------
# モード変更時のコールバック
# --------------------------------
on-mode-changed = []

# --------------------------------
# キーボード配列
# --------------------------------
[key-mapping]
preset = 'qwerty'

# --------------------------------
# ウィンドウ間の隙間設定
# --------------------------------
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# --------------------------------
# メインモードのキーバインド
# --------------------------------
[mode.main.binding]

# ================================
# レイアウト切り替え
# ================================
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# ================================
# フォーカス移動（hjkl）
# ================================
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# ================================
# フォーカス移動（矢印キー追加）
# ================================
alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# ================================
# ウィンドウ移動（hjkl）
# ================================
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# ================================
# ウィンドウ移動（矢印キー追加）
# ================================
alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# ================================
# ウィンドウサイズ変更
# ================================
# alt + - でウィンドウを小さく, alt + = でウィンドウを大きく
alt-minus = 'resize smart -50'
alt-shift-minus = 'resize smart +50'

# ================================
# ワークスペース移動
# ================================
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-a = 'workspace A'
alt-b = 'workspace B'
alt-c = 'workspace C'
alt-d = 'workspace D'
alt-e = 'workspace E'
alt-f = 'workspace F'
alt-g = 'workspace G'
alt-i = 'workspace I'
alt-m = 'workspace M'
alt-n = 'workspace N'
alt-o = 'workspace O'
alt-p = 'workspace P'
alt-q = 'workspace Q'
alt-r = 'workspace R'
alt-s = 'workspace S'
alt-t = 'workspace T'
alt-u = 'workspace U'
alt-v = 'workspace V'
alt-w = 'workspace W'
alt-x = 'workspace X'
alt-y = 'workspace Y'
alt-z = 'workspace Z'

# ================================
# ウィンドウを別ワークスペースへ移動
# ================================
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-g = 'move-node-to-workspace G'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-o = 'move-node-to-workspace O'
alt-shift-p = 'move-node-to-workspace P'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-r = 'move-node-to-workspace R'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-u = 'move-node-to-workspace U'
alt-shift-v = 'move-node-to-workspace V'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-x = 'move-node-to-workspace X'
alt-shift-y = 'move-node-to-workspace Y'
alt-shift-z = 'move-node-to-workspace Z'
cmd-right = 'workspace next'
cmd-left  = 'workspace prev'


# ================================
# 前のワークスペースへ戻る
# ================================
alt-tab = 'workspace-back-and-forth'

# ================================
# ワークスペースを別モニタへ移動
# ================================
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ================================
# service モード
# ================================
alt-shift-semicolon = 'mode service'

# --------------------------------
# service モードのキーバインド
# --------------------------------
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# --------------------------------
# 特定のアプリケーションを指定のワークスペースに表示する
# --------------------------------
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace O'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace G'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.microsoft.edgemac'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace D'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'com.microsoft.copilot-mac'
run = 'move-node-to-workspace 2'

